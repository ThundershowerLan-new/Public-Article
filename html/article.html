<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文章 - Public Article</title>
</head>
<body>
</body>

<script>
    const id = document.location.href.split("/").at(-1);
    const form = new FormData();
    form.set("id", id);

    fetch("/article", {
        method: "POST",
        body: form
    })
        .then(response => response.json())
        .then(response => {
            if (response.code === 200) {
                document.title = response.data.title;
                document.body.innerHTML = response.data.body;
            } else {
                document.location.href = "/error";
            }
        })
        .catch(error => {
            if (error !== undefined) {
                console.error(error);
            }
        })
</script>
</html>
